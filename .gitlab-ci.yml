deploy_android_release:
  stage: release
  dependencies:
    - package_android
    - screenshots_android
  script:
    - cd android/
    - bundle install
    - bundle exec fastlane deploy
  only:
    - main
  tags:
    - macos

deploy_ios_release:
  stage: release
  dependencies:
    - package_ios
    - screenshots_ios
  script:
    - cd ios/App/
    - bundle install
    - bundle exec fastlane deploy
  only:
    - main
  tags:
    - macos

deploy_android_testflight:
  stage: testflight
  dependencies:
    - package_android
  script:
    - cd android/
    - bundle install
    - bundle exec fastlane deploy_testflight
  only:
    - testflight
  tags:
    - macos

deploy_ios_testflight:
  stage: release
  dependencies:
    - package_ios
  script:
    - cd ios/App/
    - bundle install
    - bundle exec fastlane deploy_testflight
  only:
    - testflight
  tags:
    - macos
