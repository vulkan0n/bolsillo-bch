# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages

stages:
  - version
  - build
  - test
  - package
  - screenshots
  - testflight
  - release

default:
  before_script:
    - "export LC_ALL=en_US.UTF-8"
    - "export LANG=en_US.UTF-8"
    - "export JAVA_HOME=/usr/local/opt/openjdk@21"
    - 'eval "$(rbenv init - --no-rehash zsh)"'
    - 'export SELENE_VERSION=$(grep -o ''"version": *"[^"]*"'' package.json | sed -e ''s/"version": *"//'' -e ''s/"$//'')'
    - 'echo "SELENE_VERSION $SELENE_VERSION"'

# Version Bump (runs before build on main)
version:
  stage: version
  script:
    - scripts/chversion
  only:
    - main
    - testflight
  tags:
    - macos

# Build
build_sync:
  stage: build
  image: node:lts-alpine
  script:
    - "which git || (apk update && apk add git)"
    - corepack enable pnpm
    - pnpm install --frozen-lockfile
    - pnpm test
    - pnpm run build:ci
    - npx cap sync
  artifacts:
    paths:
      - "dist/"
      - "node_modules/**/*capacitor*"
      - "android/"
      - "ios/"

# E2E Tests
test_e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.2-noble
  dependencies:
    - build_sync
  script:
    - corepack enable pnpm
    - pnpm install --frozen-lockfile
    - npx playwright test
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days

# Android Packaging
package_android:
  stage: package
  dependencies:
    - build_sync
  script:
    - cd android/
    - bundle install
    - bundle exec fastlane package
  artifacts:
    paths:
      - android/app/build/outputs/apk/release/app-release.apk
      - android/app/build/outputs/bundle/release/app-bundle.aab
    expire_in: 1 year
  only:
    - main
    - testflight
  tags:
    - macos

package_android_edge:
  stage: package
  dependencies:
    - build_sync
  script:
    - cd android/
    - bundle install
    - bundle exec fastlane package_debug
    - sha256sum app/build/outputs/apk/debug/app-debug.apk
  artifacts:
    paths:
      - android/app/build/outputs/apk/debug/app-debug.apk
  only:
    - edge
  tags:
    - macos

# Android Deployment
deploy_android_edge:
  stage: release
  image: alpine:latest
  needs:
    - package_android_edge
  dependencies:
    - package_android_edge
  script:
    - "which ssh-agent || (apk update && apk add openssh)"
    - "mkdir -p ~/.ssh && chmod 700 ~/.ssh"
    - eval $(ssh-agent -s)
    - echo "$SELENE_SSH_KEY_BASE64" | base64 -d | ssh-add - > /dev/null 2>&1
    - echo "$SSH_KNOWN_HOSTS_BASE64" | base64 -d > ~/.ssh/known_hosts
    - export SELENE_VERSION=$(grep -o 'versionName "[^"]*"' android/app/build.gradle | sed 's/versionName "//;s/"//')
    - echo "Uploading selene-edge-v$SELENE_VERSION.apk"
    - sha256sum android/app/build/outputs/apk/debug/app-debug.apk
    - ssh selene@warpgate.selene.technology "mkdir -p /srv/www/selene.cash/public/download"
    - scp android/app/build/outputs/apk/debug/app-debug.apk selene@warpgate.selene.technology:/srv/www/selene.cash/public/download/selene-edge-v$SELENE_VERSION.apk
    - scp android/app/build/outputs/apk/debug/app-debug.apk selene@warpgate.selene.technology:/srv/www/selene.cash/public/download/selene-edge.apk
    - echo ""
    - echo "=== Edge APK deployed ==="
    - echo "https://selene.cash/download/selene-edge-v$SELENE_VERSION.apk"
    - echo "https://selene.cash/download/selene-edge.apk"
  only:
    - edge

deploy_android_apk:
  stage: release
  image: alpine:latest
  when: manual
  allow_failure: true
  dependencies:
    - package_android
  script:
    - "which ssh-agent || (apk update && apk add openssh)"
    - "mkdir -p ~/.ssh && chmod 700 ~/.ssh"
    - eval $(ssh-agent -s)
    - echo "$SELENE_SSH_KEY_BASE64" | base64 -d | ssh-add - > /dev/null 2>&1
    - echo "$SSH_KNOWN_HOSTS_BASE64" | base64 -d > ~/.ssh/known_hosts
    - echo "Uploading selene-v$SELENE_VERSION.apk"
    - sha256sum android/app/build/outputs/apk/release/app-release.apk
    - scp android/app/build/outputs/apk/release/app-release.apk selene@warpgate.selene.technology:/srv/www/selene.cash/public/download/selene-v$SELENE_VERSION.apk
  only:
    - main

deploy_android_release:
  stage: release
  when: manual
  allow_failure: true
  dependencies:
    - package_android
    - screenshots_android
  script:
    - cd android/
    - bundle install
    - bundle exec fastlane deploy
  only:
    - main
  tags:
    - macos

deploy_android_testflight:
  stage: testflight
  dependencies:
    - package_android
  script:
    - cd android/
    - bundle install
    - bundle exec fastlane deploy_testflight
  only:
    - testflight
  tags:
    - macos

# iOS Packaging
package_ios:
  stage: package
  dependencies:
    - build_sync
  script:
    - cd ios/App/
    - bundle install
    - bundle exec fastlane package
  artifacts:
    paths:
      - App.ipa
  only:
    - main
    - testflight
  tags:
    - macos

# iOS Deployment
deploy_ios_release:
  stage: release
  when: manual
  allow_failure: true
  dependencies:
    - package_ios
    - screenshots_ios
  script:
    - cd ios/App/
    - bundle install
    - bundle exec fastlane deploy
  only:
    - main
  tags:
    - macos

deploy_ios_testflight:
  stage: release
  dependencies:
    - package_ios
  script:
    - cd ios/App/
    - bundle install
    - bundle exec fastlane deploy_testflight
  only:
    - testflight
  tags:
    - macos

# Web Deployment
deploy_web:
  stage: release
  image: alpine:latest
  dependencies:
    - build_sync
  script:
    - "which ssh-agent || (apk update && apk add openssh)"
    - "mkdir -p ~/.ssh && chmod 700 ~/.ssh"
    - eval $(ssh-agent -s)
    - echo "$SELENE_SSH_KEY_BASE64" | base64 -d | ssh-add - > /dev/null 2>&1
    - echo "$SSH_KNOWN_HOSTS_BASE64" | base64 -d > ~/.ssh/known_hosts
    - scp -r dist/* selene@warpgate.selene.technology:/srv/www/app.selene.cash/dist/
  only:
    - main

deploy_web_edge:
  stage: release
  image: alpine:latest
  needs:
    - build_sync
  dependencies:
    - build_sync
  script:
    - "which ssh-agent || (apk update && apk add openssh)"
    - "mkdir -p ~/.ssh && chmod 700 ~/.ssh"
    - eval $(ssh-agent -s)
    - echo "$SELENE_SSH_KEY_BASE64" | base64 -d | ssh-add - > /dev/null 2>&1
    - echo "$SSH_KNOWN_HOSTS_BASE64" | base64 -d > ~/.ssh/known_hosts
    - ssh selene@warpgate.selene.technology "mkdir -p /srv/www/edge.selene.cash/dist"
    - scp -r dist/* selene@warpgate.selene.technology:/srv/www/edge.selene.cash/dist/
  only:
    - edge

# Website Rebuild + Deploy
deploy_website:
  stage: release
  when: manual
  allow_failure: true
  script:
    - cd ../selene-website || git clone git@git.xulu.tech:selene.cash/selene-website.git ../selene-website
    - cd ../selene-website
    - yarn install --frozen-lockfile
    - yarn build
    - eval $(ssh-agent -s)
    - echo "$SELENE_SSH_KEY_BASE64" | base64 -d | ssh-add - > /dev/null 2>&1
    - echo "$SSH_KNOWN_HOSTS_BASE64" | base64 -d > ~/.ssh/known_hosts
    - scp -r dist/* selene@warpgate.selene.technology:/srv/www/selene.cash/public/
  only:
    - main
  tags:
    - macos

# GitLab Release
deploy_gitlab_release:
  stage: release
  image: alpine:latest
  script:
    - apk add git curl jq
    - git tag -a $SELENE_VERSION -m "Version $SELENE_VERSION"
    - git push origin $SELENE_VERSION
    - PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
    - |
      if [ -n "$PREV_TAG" ]; then
        CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --no-merges)
      else
        CHANGELOG="Initial release"
      fi
    - |
      curl --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        --data-urlencode "tag_name=$SELENE_VERSION" \
        --data-urlencode "description=$CHANGELOG" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
  only:
    - main

# Screenshots
screenshots_android:
  stage: screenshots
  script:
    - cd android/
    - bundle install
    - bundle exec fastlane snapshot
  artifacts:
    paths:
      - android/fastlane/screenshots
  only:
    - main
  tags:
    - macos

screenshots_ios:
  stage: screenshots
  script:
    - cd ios/App/
    - bundle install
    - bundle exec fastlane snapshot
  artifacts:
    paths:
      - ios/App/fastlane/screenshots
  only:
    - main
  tags:
    - macos
