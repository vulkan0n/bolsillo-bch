# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages

stages:
  - version
  - build
  - package
  - screenshots
  - testflight
  - release

version:
  stage: version
  script:
    - scripts/chversion
  only:
    - main
    - testflight
  tags:
    - macos
  
build_sync:
  stage: build
  image: node:lts-alpine
  script:
    - yarn install
    - yarn build
    - npx cap sync
  artifacts:
    paths:
      - "dist/"

package_android:
  stage: package
  dependencies:
    - build_sync
  script:
    - cd android/
    - bundle install
    - bundle exec fastlane package
  artifacts:
    paths:
      - build/app/outputs/apk/release/app-release.apk
      - build/app/outputs/bundle/release/app-bundle.aab
    expire_in: 1 year
  only:
    - main
    - testflight
  tags:
    - macos

package_ios:
  stage: package
  dependencies:
    - build_sync
  script:
    - cd ios/App/
    - bundle install
    - bundle exec fastlane package
  artifacts:
    paths:
      - App.ipa
  only:
    - main
    - testflight
  tags:
    - macos

screenshots_android:
  stage: screenshots
  script:
    - cd android/
    - bundle install
    - bundle exec fastlane snapshot
  artifacts:
    paths:
      - android/fastlane/screenshots
  only:
    - main
  tags:
    - macos

screenshots_ios:
  stage: screenshots
  script:
    - cd ios/App/
    - bundle install
    - bundle exec fastlane snapshot
  artifacts:
    paths:
      - ios/App/fastlane/screenshots
  only:
    - main
  tags:
    - macos

deploy_gitlab_release:
  stage: release
  script:
    - git tag -a $SELENE_VERSION -m "Version $SELENE_VERSION"
    - git push origin $SELENE_VERSION
  only:
    - main

